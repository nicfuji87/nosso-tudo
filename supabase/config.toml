# Configuração do Supabase CLI para o projeto Nosso Tudo.
# project_id deve casar com o --project-ref usado no MCP (.claude/settings.json).
project_id = "ecwcqooogsvsrddwjavh"

[db]
major_version = 15

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true

[storage]
enabled = true
file_size_limit = "10MiB"
